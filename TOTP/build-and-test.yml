name: Build, Test and Publish TOTP Manager App

on:
  push:
    branches: [master]
    tags:
      - 'v*'  # This triggers release publishing only when a tag is pushed
    paths:
      - '.github/workflows/**'
      - 'NuGet.config'
      - '*.sln'
      - '**/*.csproj'
      - 'TOTP/**'
      - 'TOTP.Core/**'
      - 'TOTP.DAL/**'
      - 'TOTP.Infrastructure/**'
      - 'TOTP.Tests/**'
      - 'scripts/**'
  pull_request:
    branches: [master]
    paths:
      - '.github/workflows/**'
      - 'NuGet.config'
      - '*.sln'
      - '**/*.csproj'
      - 'TOTP/**'
      - 'TOTP.Core/**'
      - 'TOTP.DAL/**'
      - 'TOTP.Infrastructure/**'
      - 'TOTP.Tests/**'
      - 'scripts/**'

jobs:
  build-test:
    runs-on: windows-latest

    env:
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      NETSPARKLE_PUBLIC_KEY: ${{ secrets.NETSPARKLE_PUBLIC_KEY }}
      NETSPARKLE_PRIVATE_KEY: ${{ secrets.NETSPARKLE_PRIVATE_KEY }}
      SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln
            NuGet.config

      - name: Restore with NuGet.config
        run: dotnet restore TOTP.sln --nologo --verbosity minimal --configfile NuGet.config --source https://api.nuget.org/v3/index.json

      - name: Build solution
        run: dotnet build --configuration Release --no-restore --nologo --verbosity minimal

      - name: Run fast tests (PR)
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          dotnet test --configuration Release --no-build --nologo --verbosity minimal `
            --filter "FullyQualifiedName!~Integration&FullyQualifiedName!~IdleMonitoringBackgroundServiceTests&FullyQualifiedName!~UserActivityServiceTests"

      - name: Run full tests (push/tags)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          dotnet test --configuration Release --no-build --nologo --verbosity minimal `
            --logger "console;verbosity=minimal"

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    env:
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      NETSPARKLE_PUBLIC_KEY: ${{ secrets.NETSPARKLE_PUBLIC_KEY }}
      NETSPARKLE_PRIVATE_KEY: ${{ secrets.NETSPARKLE_PRIVATE_KEY }}
      SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"
          cache: true
          cache-dependency-path: |
            **/*.csproj
            **/*.sln
            NuGet.config

      - name: Restore dependencies
        run: dotnet restore TOTP/TOTP.UI.WPF.csproj --nologo --verbosity minimal --configfile NuGet.config --source https://api.nuget.org/v3/index.json -r win-x64

      - name: Compute release version metadata
        id: versioning
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+)-rc(?<rc>\d+)$') {
            throw "Release tag '$tag' does not match expected format v<major>.<minor>.<patch>-rc<nr>."
          }

          $baseVersion = $Matches.version
          $releaseVersion = "$baseVersion-rc$($Matches.rc)"
          $fileVersion = "$baseVersion.$($Matches.rc)"

          "base_version=$baseVersion" >> $env:GITHUB_OUTPUT
          "release_version=$releaseVersion" >> $env:GITHUB_OUTPUT
          "file_version=$fileVersion" >> $env:GITHUB_OUTPUT

          Write-Host "Release version: $releaseVersion"
          Write-Host "File version: $fileVersion"

      - name: Publish WPF app (fast startup)
        run: |
          dotnet publish TOTP/TOTP.UI.WPF.csproj `
            --configuration Release `
            --no-restore `
            --nologo `
            --verbosity minimal `
            --runtime win-x64 `
            --self-contained false `
            -p:PublishSingleFile=false `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.versioning.outputs.release_version }} `
            -p:InformationalVersion=${{ steps.versioning.outputs.release_version }} `
            -p:FileVersion=${{ steps.versioning.outputs.file_version }} `
            -p:AssemblyVersion=${{ steps.versioning.outputs.base_version }}.0 `
            --output publish-fast

      - name: Publish WPF app (portable single-file)
        run: |
          dotnet publish TOTP/TOTP.UI.WPF.csproj `
            --configuration Release `
            --no-restore `
            --nologo `
            --verbosity minimal `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:PublishTrimmed=false `
            -p:Version=${{ steps.versioning.outputs.release_version }} `
            -p:InformationalVersion=${{ steps.versioning.outputs.release_version }} `
            -p:FileVersion=${{ steps.versioning.outputs.file_version }} `
            -p:AssemblyVersion=${{ steps.versioning.outputs.base_version }}.0 `
            --output publish-portable

      - name: Cache .NET global tools
        id: cache-dotnet-tools
        uses: actions/cache@v4
        with:
          path: ~/.dotnet/tools
          key: ${{ runner.os }}-dotnet-tools-netsparkle-appcastgenerator-v2

      - name: Sign published executable
        if: ${{ env.SIGNING_CERT_BASE64 != '' && env.SIGNING_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          ./TOTP/Properties/Signing/Sign-App.ps1 -ExePath ./publish-fast/TOTP.UI.WPF.exe
          ./TOTP/Properties/Signing/Sign-App.ps1 -ExePath ./publish-portable/TOTP.UI.WPF.exe

      - name: Signing skipped notice
        if: ${{ env.SIGNING_CERT_BASE64 == '' || env.SIGNING_CERT_PASSWORD == '' }}
        run: |
          echo "Signing skipped: SIGNING_CERT_BASE64 or SIGNING_CERT_PASSWORD is not configured."

      - name: Compress release artifacts
        run: |
          Compress-Archive -Path publish-fast\* -DestinationPath TOTP-Manager-fast.zip
          Compress-Archive -Path publish-portable\* -DestinationPath TOTP-Manager-portable.zip

      - name: Install NetSparkle appcast tool
        if: ${{ env.NETSPARKLE_PUBLIC_KEY != '' && env.NETSPARKLE_PRIVATE_KEY != '' }}
        run: |
          dotnet tool list --global | findstr /I "NetSparkleUpdater.Tools.AppCastGenerator" >nul
          if ($LASTEXITCODE -ne 0) {
            dotnet tool install --global NetSparkleUpdater.Tools.AppCastGenerator --verbosity minimal
          }

      - name: Generate appcast for auto-update
        if: ${{ env.NETSPARKLE_PUBLIC_KEY != '' && env.NETSPARKLE_PRIVATE_KEY != '' }}
        shell: pwsh
        run: |
          $keyDir = Join-Path $env:RUNNER_TEMP "netsparkle-keys"
          New-Item -ItemType Directory -Path $keyDir -Force | Out-Null
          $pubPath = Join-Path $keyDir "NetSparkle_Ed25519.pub"
          $privPath = Join-Path $keyDir "NetSparkle_Ed25519.priv"
          Set-Content -Path $pubPath -Value $env:NETSPARKLE_PUBLIC_KEY -Encoding ASCII
          Set-Content -Path $privPath -Value $env:NETSPARKLE_PRIVATE_KEY -Encoding ASCII
          ./scripts/release/Generate-Appcast.ps1 `
            -ReleaseFolder "./publish-fast" `
            -BaseDownloadUrl "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" `
            -PrivateKeyPath $privPath `
            -PublicKeyPath $pubPath

      - name: Appcast generation skipped notice
        if: ${{ env.NETSPARKLE_PUBLIC_KEY == '' || env.NETSPARKLE_PRIVATE_KEY == '' }}
        run: |
          echo "Appcast generation skipped: NETSPARKLE_PUBLIC_KEY or NETSPARKLE_PRIVATE_KEY is not configured."

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            TOTP-Manager-fast.zip
            TOTP-Manager-portable.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }} #repo scope token for uploading to release

      - name: Upload auto-update assets to GitHub Release
        if: ${{ env.NETSPARKLE_PUBLIC_KEY != '' && env.NETSPARKLE_PRIVATE_KEY != '' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish-fast/TOTP.UI.WPF.exe
            publish-fast/appcast.xml
            publish-fast/appcast.xml.signature
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
