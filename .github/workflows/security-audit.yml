name: Security Audit and Verification

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      dast_target_url:
        description: "Optional URL target for OWASP ZAP baseline scan (https://...)"
        required: false
        type: string

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  dependency-review:
    name: Dependency Review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  sast-codeql:
    name: SAST (CodeQL C#)
    runs-on: windows-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
    permissions:
      contents: read
      actions: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Prepare NuGet packages folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:NUGET_PACKAGES | Out-Null

      - name: Detect Code Scanning capability
        id: codeql-capability
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request("GET /repos/{owner}/{repo}/code-scanning/alerts", {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 1
              });
              core.setOutput("enabled", "true");
            } catch (error) {
              core.warning(`Code scanning API unavailable: ${error.message}`);
              core.setOutput("enabled", "false");
            }

      - name: Initialize CodeQL
        if: steps.codeql-capability.outputs.enabled == 'true'
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Restore
        if: steps.codeql-capability.outputs.enabled == 'true'
        run: dotnet restore TOTP.sln --nologo --verbosity minimal --configfile NuGet.config --source https://api.nuget.org/v3/index.json

      - name: Build
        if: steps.codeql-capability.outputs.enabled == 'true'
        run: dotnet build TOTP.sln --configuration Release --no-restore --nologo --verbosity minimal

      - name: Analyze
        if: steps.codeql-capability.outputs.enabled == 'true'
        uses: github/codeql-action/analyze@v4

      - name: CodeQL skipped notice
        if: steps.codeql-capability.outputs.enabled != 'true'
        run: echo "CodeQL skipped because code scanning is not enabled for this repository."

  sca-dotnet:
    name: Dependency Vulnerability Scan (.NET)
    runs-on: windows-latest
    env:
      NUGET_PACKAGES: ${{ github.workspace }}\.nuget\packages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Prepare NuGet packages folder
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path $env:NUGET_PACKAGES | Out-Null

      - name: Restore
        run: dotnet restore TOTP.sln --nologo --verbosity minimal --configfile NuGet.config --source https://api.nuget.org/v3/index.json

      - name: Scan NuGet vulnerabilities
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -Path artifacts -ItemType Directory -Force | Out-Null
          dotnet list TOTP.sln package --vulnerable --include-transitive --format json > artifacts/dependency-vulnerabilities.json
          $vulnerableExitCode = $LASTEXITCODE

          dotnet list TOTP.sln package --deprecated --include-transitive --format json > artifacts/dependency-deprecated.json
          $deprecatedExitCode = $LASTEXITCODE

          if ($vulnerableExitCode -gt 1) {
            throw "dotnet list --vulnerable failed with exit code $vulnerableExitCode"
          }

          if ($deprecatedExitCode -gt 1) {
            throw "dotnet list --deprecated failed with exit code $deprecatedExitCode"
          }

          if ($vulnerableExitCode -eq 1) {
            Write-Warning "NuGet vulnerabilities were detected. See artifacts/dependency-vulnerabilities.json"
          }

          if ($deprecatedExitCode -eq 1) {
            Write-Warning "Deprecated NuGet packages were detected. See artifacts/dependency-deprecated.json"
          }

      - name: Upload SCA evidence
        uses: actions/upload-artifact@v4
        with:
          name: sca-evidence
          path: artifacts/*.json

  secrets-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dast-zap:
    name: DAST (OWASP ZAP Baseline)
    if: github.event_name == 'workflow_dispatch' && inputs.dast_target_url != ''
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ZAP baseline scan
        run: |
          mkdir -p artifacts
          docker run --rm \
            -v "${PWD}/artifacts:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "${{ inputs.dast_target_url }}" \
            -J zap-report.json \
            -r zap-report.html \
            -m 5

      - name: Upload DAST evidence
        uses: actions/upload-artifact@v4
        with:
          name: dast-zap-evidence
          path: artifacts/zap-report.*
