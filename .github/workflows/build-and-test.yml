name: Build and Test TOTP Manager App

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: windows-latest #github-hosted runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x" # Or your actual version: 6.0.x, 7.0.x, etc.

      - name: Cache NuGet packages # if the workflow fails, the cache will not be saved.
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-


      - name: Restore with NuGet.config
        run: dotnet restore TOTP.sln --configfile NuGet.config

      - name: Build solution
        env:
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
          SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE_KEY }}
          
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal
