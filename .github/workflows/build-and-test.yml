name: Build, Test and Publish TOTP Manager App

on:
  push:
    branches: [master]
    tags:
      - 'v*'  # This triggers release publishing only when a tag is pushed
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: windows-latest

    env:
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore with NuGet.config
        run: dotnet restore TOTP.sln --configfile NuGet.config

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    env:
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore TOTP.sln --configfile NuGet.config

      - name: Publish WPF app
        run: |
          dotnet publish TOTP/TOTP.Manager.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:PublishTrimmed=false `
            --output publish

      - name: Compress app into zip
        run: Compress-Archive -Path publish\* -DestinationPath TOTP.Manager.zip

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TOTP.Manager.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
