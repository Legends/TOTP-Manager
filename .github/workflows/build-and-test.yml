name: Build, Test and Publish TOTP Manager App

on:
  push:
    branches: [master]
    tags:
      - 'v*'  # This triggers release publishing only when a tag is pushed
  pull_request:
    branches: [master]

jobs:
  build-test:
    runs-on: windows-latest

    env:
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      NETSPARKLE_PUBLIC_KEY: ${{ secrets.NETSPARKLE_PUBLIC_KEY }}
      NETSPARKLE_PRIVATE_KEY: ${{ secrets.NETSPARKLE_PRIVATE_KEY }}
      SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore with NuGet.config
        run: dotnet restore TOTP.sln --configfile NuGet.config

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Run security regression tests
        run: |
          dotnet test TOTP.Tests/TOTP.Tests.csproj `
            --configuration Release `
            --no-build `
            --filter "FullyQualifiedName~MasterPasswordServiceTests|FullyQualifiedName~ExportServiceTests|FullyQualifiedName~ExportServiceFuzzTests|FullyQualifiedName~SensitiveDataRedactionEnricherTests|FullyQualifiedName~SensitiveTextRedactorTests|FullyQualifiedName~PasswordUnlockViewModelTests|FullyQualifiedName~PasswordPromptViewModelTests|FullyQualifiedName~ExportPasswordPromptViewModelTests|FullyQualifiedName~MainViewModelTests"

  publish:
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest

    env:
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      SIGNING_CERT_BASE64: ${{ secrets.SIGNING_CERT_BASE64 }}
      NETSPARKLE_PUBLIC_KEY: ${{ secrets.NETSPARKLE_PUBLIC_KEY }}
      NETSPARKLE_PRIVATE_KEY: ${{ secrets.NETSPARKLE_PRIVATE_KEY }}
      SYNCFUSION_LICENSE: ${{ secrets.SYNCFUSION_LICENSE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore dependencies
        run: dotnet restore TOTP.sln --configfile NuGet.config

      - name: Publish WPF app
        run: |
          dotnet publish TOTP/TOTP.UI.WPF.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeAllContentForSelfExtract=true `
            -p:PublishTrimmed=false `
            --output publish

      - name: Sign published executable
        if: ${{ env.SIGNING_CERT_BASE64 != '' && env.SIGNING_CERT_PASSWORD != '' }}
        shell: pwsh
        run: |
          ./TOTP/Properties/Signing/Sign-App.ps1 -ExePath ./publish/TOTP.UI.WPF.exe

      - name: Signing skipped notice
        if: ${{ env.SIGNING_CERT_BASE64 == '' || env.SIGNING_CERT_PASSWORD == '' }}
        run: |
          echo "Signing skipped: SIGNING_CERT_BASE64 or SIGNING_CERT_PASSWORD is not configured."

      - name: Compress app into zip
        run: Compress-Archive -Path publish\* -DestinationPath TOTP-Manager.zip

      - name: Install NetSparkle appcast tool
        if: ${{ env.NETSPARKLE_PUBLIC_KEY != '' && env.NETSPARKLE_PRIVATE_KEY != '' }}
        run: dotnet tool install --global NetSparkleUpdater.Tools.AppCastGenerator

      - name: Generate appcast for auto-update
        if: ${{ env.NETSPARKLE_PUBLIC_KEY != '' && env.NETSPARKLE_PRIVATE_KEY != '' }}
        shell: pwsh
        run: |
          $keyDir = Join-Path $env:RUNNER_TEMP "netsparkle-keys"
          New-Item -ItemType Directory -Path $keyDir -Force | Out-Null
          $pubPath = Join-Path $keyDir "NetSparkle_Ed25519.pub"
          $privPath = Join-Path $keyDir "NetSparkle_Ed25519.priv"
          Set-Content -Path $pubPath -Value $env:NETSPARKLE_PUBLIC_KEY -Encoding ASCII
          Set-Content -Path $privPath -Value $env:NETSPARKLE_PRIVATE_KEY -Encoding ASCII
          ./scripts/release/Generate-Appcast.ps1 `
            -ReleaseFolder "./publish" `
            -BaseDownloadUrl "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/" `
            -PrivateKeyPath $privPath `
            -PublicKeyPath $pubPath

      - name: Appcast generation skipped notice
        if: ${{ env.NETSPARKLE_PUBLIC_KEY == '' || env.NETSPARKLE_PRIVATE_KEY == '' }}
        run: |
          echo "Appcast generation skipped: NETSPARKLE_PUBLIC_KEY or NETSPARKLE_PRIVATE_KEY is not configured."

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TOTP-Manager.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }} #repo scope token for uploading to release

      - name: Upload auto-update assets to GitHub Release
        if: ${{ env.NETSPARKLE_PUBLIC_KEY != '' && env.NETSPARKLE_PRIVATE_KEY != '' }}
        uses: softprops/action-gh-release@v2
        with:
          files: |
            publish/TOTP.UI.WPF.exe
            publish/appcast.xml
            publish/appcast.xml.signature
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
