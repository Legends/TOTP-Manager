# azure-pipelines.yml
# Build, Test and (on tags) Publish a zipped artifact for TOTP Manager
# Source repo: GitHub (this file lives in GitHub)
# Runner: your self-hosted Windows agent (pool below)

name: $(Date:yyyyMMdd).$(Rev:.r)

trigger:
  branches:
    include:
      - master
  tags:
    include:
      - v* # run when a tag like v1.2.3 is pushed

pr:
  branches:
    include:
      - master

variables:
  BuildConfiguration: Release
  # Extract tag (refs/tags/v1.2.3 -> v1.2.3). Empty on branch builds.
  TagName: $[ replace(variables['Build.SourceBranch'], 'refs/tags/', '') ]
  ArtifactName: drop

pool:
  name: Default # <-- your self-hosted agent pool name

stages:
  # ─────────────────────────────────────────────────────────────────────────────
  - stage: Build_Test
    displayName: Build & Test
    jobs:
      - job: Build
        displayName: Build + Test (.NET 9)
        steps:
          - checkout: self
            fetchDepth: "0" # must be a string in Azure DevOps

          - task: UseDotNet@2
            displayName: "Use .NET SDK 9.x"
            inputs:
              packageType: "sdk"
              version: "9.x"
              includePreviewVersions: true

          - task: Cache@2
            displayName: "Cache NuGet packages"
            inputs:
              key: "nuget | $(Agent.OS) | **/*.csproj"
              restoreKeys: |
                nuget | $(Agent.OS)
                nuget
              path: '$(UserProfile)\.nuget\packages'

          - script: dotnet restore TOTP.sln --configfile NuGet.config
            displayName: "Restore with NuGet.config"

          - script: dotnet build TOTP.sln --configuration $(BuildConfiguration) --no-restore
            displayName: "Build solution"

          - script: dotnet test --configuration $(BuildConfiguration) --no-build --verbosity normal
            displayName: "Run tests"

  # ─────────────────────────────────────────────────────────────────────────────
  - stage: Publish
    displayName: Publish (on tag)
    dependsOn: Build_Test
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    jobs:
      - job: PublishJob
        displayName: Publish WPF + Zip
        steps:
          - checkout: self
            fetchDepth: "0"

          - task: UseDotNet@2
            displayName: "Use .NET SDK 9.x"
            inputs:
              packageType: "sdk"
              version: "9.x"
              includePreviewVersions: true

          - script: dotnet restore TOTP.sln --configfile NuGet.config
            displayName: "Restore dependencies"

          - powershell: |
              dotnet publish TOTP/TOTP.UI.WPF.csproj `
                --configuration $(BuildConfiguration) `
                --runtime win-x64 `
                --self-contained true `
                -p:PublishSingleFile=true `
                -p:IncludeAllContentForSelfExtract=true `
                -p:PublishTrimmed=false `
                --output "$(Build.ArtifactStagingDirectory)\publish"
            displayName: "Publish WPF app (win-x64, self-contained)"

          - powershell: |
              $zip = "$(Build.ArtifactStagingDirectory)\TOTP-Manager-$([string]::IsNullOrEmpty('$(TagName)') ? 'dev' : '$(TagName)').zip"
              Compress-Archive -Path "$(Build.ArtifactStagingDirectory)\publish\*" -DestinationPath $zip -Force
            displayName: "Compress app into zip"

          - task: PublishBuildArtifacts@1
            displayName: "Publish artifact"
            inputs:
              PathtoPublish: "$(Build.ArtifactStagingDirectory)"
              ArtifactName: "$(ArtifactName)"
              publishLocation: "Container"
